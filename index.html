<!DOCTYPE html>
<html lang="pt-PT" prefix="og: https://ogp.me/ns#" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricardo Neves</title>
    <meta name="description" content="Ricardo Neves - Músico e cantautor português">
    <link rel="canonical" href="https://ricardonevesmusic.github.io/">
    <meta property="og:locale" content="pt_PT">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Ricardo Neves">
    <meta property="og:description" content="Ricardo Neves - Músico e cantautor português">
    <meta property="og:url" content="https://ricardonevesmusic.github.io/">
    <meta property="og:site_name" content="Ricardo Neves - Músico e cantautor português">
    <meta property="og:image" content="https://ricardonevesmusic.github.io/assets/content/logo1.png">
    <meta property="fb:app_id" content="147388283051744" />
    <meta property="fb:page_id" content="147388283051744" />
    <link rel="icon" type="image/png" href="assets/content/logo1.png">
    <link rel="alternate icon" href="assets/content/logo1.png" type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-content">
            <div class="logo">RN</div>
            <button class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-links">
                <a href="#music">MÚSICA</a>
                <a href="#about">BIO</a>
                <a href="#contact">CONTACTO</a>
            </div>
            <button class="theme-toggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <!-- Scroll indikatörü -->
    <div class="scroll-progress"></div>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="animated-background">
            <div class="floating-element" data-speed="1"></div>
            <div class="floating-element" data-speed="2"></div>
            <div class="floating-element" data-speed="3"></div>
            <div class="floating-element" data-speed="2"></div>
            <div class="floating-element" data-speed="1"></div>
            <div class="floating-note">♪</div>
            <div class="floating-note">♫</div>
            <div class="floating-note">♬</div>
        </div>
        <div class="wave-animation"></div>
        <div class="hero-content">
            <div class="hero-left">
                <div class="artist-info">
                    <h1>Ricardo Neves</h1>
                    <p>✨ Músico e cantautor português</p>
                    <div class="social-links">
                        <a href="https://open.spotify.com/artist/6WlL4P6eUaXGtFagtXvYX2" target="_blank" class="spotify-link">
                            <i class="fab fa-spotify"></i>
                            <span class="tooltip">Spotify</span>
                        </a>
                        <a href="https://www.instagram.com/ricardonevesmusic" target="_blank" class="instagram-link">
                            <i class="fab fa-instagram"></i>
                            <span class="tooltip">Instagram</span>
                        </a>
                        <a href="https://soundcloud.com/ricardonevesmusic" target="_blank" class="soundcloud-link">
                            <i class="fab fa-soundcloud"></i>
                            <span class="tooltip">SoundCloud</span>
                        </a>
                    </div>
                </div>
            </div>
            <div class="hero-right">
                <div class="latest-track">
                    <span class="tag">LANÇAMENTO RECENTE</span>
                    <iframe style="border-radius:12px" 
                        src="https://open.spotify.com/embed/track/5uufnK4wmRkYxllsQLebnW?utm_source=generator&theme=0" 
                        width="100%" 
                        height="152" 
                        frameBorder="0" 
                        allowfullscreen="" 
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                        loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>
    </section>

    <!-- Hero section'a 3D katmanlar ekleyelim -->
    <div class="hero-layers">
        <div class="layer" data-speed="0.1"></div>
        <div class="layer" data-speed="0.2"></div>
        <div class="layer" data-speed="0.3"></div>
    </div>

    <!-- Müzik dalgası için canvas ekleyelim -->
    <canvas id="waveCanvas"></canvas>

    <!-- Music Section -->
    <section id="music" class="music">
        <div class="animated-background">
            <div class="floating-element" data-speed="1"></div>
            <div class="floating-element" data-speed="2"></div>
            <div class="floating-element" data-speed="3"></div>
            <div class="floating-note">♪</div>
            <div class="floating-note">♫</div>
        </div>
        <div class="wave-animation"></div>
        <h2>MÚSICA</h2>
        <div class="music-container">
            <div class="track-list">
                <div class="track">
                    <div class="track-inner">
                        <iframe style="border-radius:12px" 
                            src="https://open.spotify.com/embed/track/4zQgELJewbK9GteYhasrMs?utm_source=generator&theme=0" 
                            width="100%" 
                            height="152" 
                            frameBorder="0" 
                            allowfullscreen="" 
                            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                            loading="lazy">
                        </iframe>
                    </div>
                </div>
                <div class="track">
                    <div class="track-inner">
                        <iframe style="border-radius:12px" 
                            src="https://open.spotify.com/embed/track/7EoBHSqBF46eooiJKFsT2g?utm_source=generator&theme=0" 
                            width="100%" 
                            height="152" 
                            frameBorder="0" 
                            allowfullscreen="" 
                            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                            loading="lazy">
                        </iframe>
                    </div>
                </div>
                <div class="track">
                    <div class="track-inner">
                        <iframe style="border-radius:12px" 
                            src="https://open.spotify.com/embed/track/21BXsSyrTKfIPPm9quDmxL?utm_source=generator&theme=0" 
                            width="100%" 
                            height="152" 
                            frameBorder="0" 
                            allowfullscreen="" 
                            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                            loading="lazy">
                        </iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about" class="about">
        <div class="animated-background">
            <div class="floating-element" data-speed="2"></div>
            <div class="floating-element" data-speed="1"></div>
            <div class="floating-element" data-speed="3"></div>
            <div class="floating-note">♬</div>
            <div class="floating-note">♪</div>
        </div>
        <div class="wave-animation"></div>
        <h2>BIO</h2>
        <div class="about-content">
            <div class="about-text">
                <p>Ricardo Neves • Vamos juntos nesta viagem?</p>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact">
        <div class="animated-background">
            <div class="floating-element" data-speed="1"></div>
            <div class="floating-element" data-speed="3"></div>
            <div class="floating-element" data-speed="2"></div>
            <div class="floating-note">♫</div>
            <div class="floating-note">♬</div>
        </div>
        <div class="wave-animation"></div>
        <h2>CONTACTO</h2>
        <div class="contact-content">
            <a href="mailto:ricardonevesmusic@gmail.com" class="contact-btn">
                <i class="fas fa-envelope"></i>
                ricardonevesmusic@gmail.com
            </a>
            <div class="social-links">
                <a href="https://www.instagram.com/ricardonevesmusic" target="_blank" class="instagram-link">
                    <i class="fab fa-instagram"></i>
                    <span class="tooltip">Instagram</span>
                </a>
                <a href="https://open.spotify.com/artist/6WlL4P6eUaXGtFagtXvYX2" target="_blank" class="spotify-link">
                    <i class="fab fa-spotify"></i>
                    <span class="tooltip">Spotify</span>
                </a>
                <a href="https://soundcloud.com/ricardonevesmusic" target="_blank" class="soundcloud-link">
                    <i class="fab fa-soundcloud"></i>
                    <span class="tooltip">SoundCloud</span>
                </a>
            </div>
        </div>
    </section>

    <footer>
        <p></p>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
